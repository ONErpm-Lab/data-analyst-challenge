version: 2

models:
  - name: mart__revenue_overview
    description: >
      Monthly revenue and quantity totals across all stores, countries and genres.
      Streams and downloads are separated. Reversals are isolated for transparency.
      Each month includes a year-over-year comparison against the same month in the prior year.
      Grain: one row per month and currency.
    columns:
      - name: date_of_event
        description: First day of the month the events took place (truncated to month).
        tests:
          - not_null
      - name: currency
        description: Currency of the revenue amounts.
        tests:
          - not_null
      - name: stream_quantity
        description: Total number of streams in the month, excluding reversals.
      - name: download_quantity
        description: Total number of downloads in the month, excluding reversals.
      - name: total_quantity
        description: Total streams and downloads in the month, excluding reversals.
        tests:
          - not_null
      - name: reversal_quantity
        description: Total quantity from reversal events in the month (negative values). Zero when no reversals exist.
        tests:
          - not_null
      - name: gross_revenue
        description: Total revenue in the month excluding reversals (receita bruta — before fees and costs).
        tests:
          - not_null
      - name: reversal_revenue
        description: Revenue from reversal events only (negative values representing fees and costs). Zero when no reversals exist.
        tests:
          - not_null
      - name: net_revenue
        description: Total revenue in the month including reversals (receita líquida — gross_revenue minus costs).
        tests:
          - not_null
      - name: prior_year_net_revenue
        description: Net revenue from the same month in the prior year. Null for months in 2022 (no prior year data).
      - name: year_over_year_growth_pct
        description: >
          Percentage change in net revenue compared to the same month in the prior year.
          Null for months in 2022. Positive = growth, negative = decline.
      - name: event_year
        description: Calendar year extracted from date_of_event.
        tests:
          - not_null
      - name: event_month
        description: Calendar month (1–12) extracted from date_of_event.
        tests:
          - not_null
